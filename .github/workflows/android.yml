name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # This allows you to click a button to build manually anytime

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'
        cache: gradle

    - name: Grant Execute Permission for Gradle
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: android-debug-apk
        path: app/build/outputs/apk/debug/*.apk
            - name: Build with Gradle
      run: ./gradlew assembleDebug
      working-directory: ./YOUR_SUBFOLDER_NAME_HERE  # <-- Add this line if code is in a subfolder

